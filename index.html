<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LagsMC Eventos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: #eaeaea;
  overflow-y: scroll; /* evita bug de layout */
}

/* SCROLLBAR */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #0f0f0f;
}

::-webkit-scrollbar-thumb {
  background: #ff8800;
  border-radius: 10px;
  border: 2px solid #0f0f0f;
}

::-webkit-scrollbar-thumb:hover {
  background: #cc6e00;
}

/* Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: #ff8800 #0f0f0f;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  box-sizing: border-box;
  background: rgba(17,17,17,0.9);
  backdrop-filter: blur(6px);
  padding: 15px 40px 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #222;
}

header h1 {
  margin: 0;
  color: #ff8800;
}

/* BOTÃO MENU */
.menu-btn {
  background: #ff8800;
  border: none;
  padding: 8px 15px;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.2s;
  margin-right: 5px;
}

.menu-btn:hover {
  background: #cc6e00;
  transform: scale(1.08);
}

/* LAYOUT */
.container {
  display: flex;
  margin-top: 60px;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #111;
  height: calc(100vh - 60px);
  overflow-y: auto;
  padding: 15px;
  border-right: 1px solid #222;
  transition: 0.3s;
}

.sidebar h3 {
  color: #777;
  font-size: 12px;
  margin-top: 20px;
}

.sidebar a {
  display: block;
  padding: 8px;
  border-radius: 6px;
  color: #ccc;
  text-decoration: none;
  transition: 0.2s;
}

.sidebar a:hover {
  background: #1a1a1a;
  color: #ff8800;
  padding-left: 14px;
}

/* ESCONDER MENU */
.hidden {
  width: 0;
  padding: 0;
  overflow: hidden;
}

/* CONTEÚDO */
.content {
  flex: 1;
  padding: 30px;
  max-width: 900px;
  opacity: 1;
  transition: opacity 0.25s ease;
}

.fade-out {
  opacity: 0;
}

/* CAIXAS */
.box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  margin-top: 15px;
  transition: 0.25s;
  border: 1px solid transparent;
}

.box:hover {
  transform: translateY(-4px);
  background: #202020;
  border: 1px solid rgba(255,136,0,0.4);
}

/* TEXTO */
.cmd {
  color: #ff8800;
  font-weight: bold;
}

.box p {
  transition: 0.2s;
}

.box p:hover {
  color: #ff8800;
  transform: translateX(4px);
  text-shadow: 0 0 5px rgba(255,136,0,0.5);
}

/* BOTÃO COPIAR */
.copy-btn {
  background: #ff8800;
  border: none;
  padding: 10px 15px;
  margin-top: 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
  overflow: hidden;
}

.copy-btn::after {
  content: "";
  position: absolute;
  width: 0;
  height: 100%;
  left: 0;
  top: 0;
  background: rgba(255,255,255,0.2);
  transition: 0.3s;
}

.copy-btn:hover::after {
  width: 100%;
}

.copy-btn:hover {
  transform: scale(1.05);
}

.copy-btn.copied {
  background: #00cc66;
}

.copy-text {
  font-size: 12px;
  color: #aaa;
  margin-top: 5px;
}
</style>

</head>

<body>

<header>
  <h1>LagsMC Eventos</h1>
  <button class="menu-btn" onclick="toggleMenu()" id="menuBtn">☰ Menu</button>
</header>

<div class="container">

  <div class="sidebar" id="menu">

    <h3>COMEÇAR</h3>
    <a href="#" onclick="carregar('inicio'); return false;">Introdução</a>
    <a href="#" onclick="carregar('entrar'); return false;">Como entrar</a>

    <h3>JOGADOR</h3>
    <a href="#" onclick="carregar('comandos'); return false;">Comandos</a>
    <a href="#" onclick="carregar('eventos'); return false;">Eventos</a>

    <h3>SERVIDOR</h3>
    <a href="#" onclick="carregar('vantagens'); return false;">Vantagens</a>

  </div>

  <div class="content" id="conteudo"></div>

</div>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  const btn = document.getElementById("menuBtn");

  menu.classList.toggle("hidden");

  if (menu.classList.contains("hidden")) {
    btn.innerText = "☰ Menu";
  } else {
    btn.innerText = "☰ Menu";
  }
}

function copiarIP(btn) {
  navigator.clipboard.writeText("lagsmc.jogar.io");

  btn.classList.add("copied");
  btn.innerText = "✔ Copiado!";

  setTimeout(() => {
    btn.classList.remove("copied");
    btn.innerText = "Copiar IP";
  }, 2000);
}

function trocarConteudo(html) {
  const conteudo = document.getElementById("conteudo");

  conteudo.classList.add("fade-out");

  setTimeout(() => {
    conteudo.innerHTML = html;
    conteudo.classList.remove("fade-out");
  }, 200);
}

function carregar(pagina) {

  if (pagina === "inicio") {
    trocarConteudo(`
      <h2>Introdução</h2>
      <p>Servidor focado em eventos rápidos e competitivos.</p>

      <div class="box">
        <p>Entrou, jogou. Sem enrolação.</p>
        <p>Eventos dinâmicos e constantes.</p>
      </div>
    `);
  }

  if (pagina === "entrar") {
    trocarConteudo(`
      <h2>Como entrar</h2>

      <div class="box">
        <h3>Endereço do servidor</h3>
        <p><b>lagsmc.jogar.io</b></p>
        <button class="copy-btn" onclick="copiarIP(this)">Copiar IP</button>
        <p class="copy-text">Clique para copiar automaticamente</p>
      </div>

      <div class="box">
        <h3>Requisitos</h3>
        <p>Minecraft Java Edition</p>
        <p>Versão: 1.8.9 ou superior</p>
      </div>

      <div class="box">
        <h3>Passo a passo</h3>
        <p>Abra o Minecraft → Multiplayer → Adicionar servidor</p>
        <p>Coloque o IP e entre no servidor</p>
      </div>
    `);
  }

  if (pagina === "comandos") {
    trocarConteudo(`
      <h2>Comandos</h2>

      <div class="box">
        <p><span class="cmd">/loja</span></p>
        <p>Abre o menu principal.</p>
      </div>

      <div class="box">
        <p><span class="cmd">/evento</span></p>
        <p>Mostra o evento atual.</p>
      </div>
    `);
  }

  if (pagina === "eventos") {
    trocarConteudo(`
      <h2>Eventos</h2>

      <div class="box">
        <h3>Pirâmide</h3>
        <p>Suba enquanto luta contra outros jogadores.</p>
      </div>

      <div class="box">
        <h3>Parkour</h3>
        <p>Complete o percurso rapidamente.</p>
      </div>

      <div class="box">
        <h3>Batatinha Frita 1, 2, 3</h3>
        <p>Se mexeu? Eliminado.</p>
      </div>

      <div class="box">
        <h3>Sumô</h3>
        <p>Empurre os outros pra fora.</p>
      </div>

      <div class="box">
        <h3>Sinuca</h3>
        <p>Derrube os inimigos nos buracos.</p>
      </div>
    `);
  }

  if (pagina === "vantagens") {
    trocarConteudo(`
      <h2>Vantagens</h2>

      <div class="box">
        <p>Eventos rápidos sem enrolação.</p>
        <p>Compatível com várias versões.</p>
      </div>
    `);
  }

}

carregar("inicio");
</script>

</body>
</html>
